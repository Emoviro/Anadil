name: Release

# Anadil release otomasyonu.
#
# Tetikleyici: vX.Y.Z formatinda bir tag push'u.
# Sonuc: GitHub Releases sayfasina ZIP + SHA256 yuklenir.
#
# Yerel paketleme: package.ps1 (manuel calistirma).
# Bu workflow ayni script'i Windows runner'da otomatik calistirir.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and package
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup MSVC environment (ml64, lib, link)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify toolchain
        shell: powershell
        run: |
          cargo --version
          rustc --version
          where.exe ml64
          where.exe lib
          where.exe link

      - name: Run tests
        shell: powershell
        run: cargo test --release

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Run packaging script (ZIP + Setup)
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\package.ps1 -Installer

      - name: Locate artifacts
        id: artifacts
        shell: powershell
        run: |
          $zip = Get-ChildItem -Path target\dist -Filter *.zip | Select-Object -First 1
          if (-not $zip) { throw "ZIP bulunamadi (target\dist altinda)." }
          $zipHash = (Get-FileHash -Algorithm SHA256 $zip.FullName).Hash
          $zipSize = "{0:N2} MB" -f ($zip.Length / 1MB)
          "zip_path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_sha=$zipHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_size=$zipSize" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          $setup = Get-ChildItem -Path target\dist -Filter "Anadil-Setup-*.exe" | Select-Object -First 1
          if ($setup) {
            $setupHash = (Get-FileHash -Algorithm SHA256 $setup.FullName).Hash
            $setupSize = "{0:N2} MB" -f ($setup.Length / 1MB)
            "setup_path=$($setup.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "setup_name=$($setup.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "setup_sha=$setupHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "setup_size=$setupSize" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "setup_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Compose release notes
        id: notes
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "${{ steps.artifacts.outputs.zip_name }}"
          $zipSize = "${{ steps.artifacts.outputs.zip_size }}"
          $zipSha  = "${{ steps.artifacts.outputs.zip_sha }}"
          $setupPath = "${{ steps.artifacts.outputs.setup_path }}"
          $setupName = "${{ steps.artifacts.outputs.setup_name }}"
          $setupSize = "${{ steps.artifacts.outputs.setup_size }}"
          $setupSha  = "${{ steps.artifacts.outputs.setup_sha }}"

          $lines = @(
            "Anadil $tag - Windows x64 release",
            "",
            "ZIP arsivi:",
            "  Dosya:  $zipName",
            "  Boyut:  $zipSize",
            "  SHA256: $zipSha"
          )

          if ($setupPath -ne "") {
            $lines += @(
              "",
              "Setup (kurulum sihirbazi):",
              "  Dosya:  $setupName",
              "  Boyut:  $setupSize",
              "  SHA256: $setupSha"
            )
          }

          $lines += @(
            "",
            "Kurulum talimatlari icin ZIP icindeki KURULUM.txt dosyasina bakin.",
            "Surum notlari icin CHANGELOG.txt dosyasina bakin.",
            "",
            "Native derleme (anadil derle) Visual Studio Build Tools gerektirir.",
            "Interpreter modu (anadil yorumla) ve native IDE Build Tools olmadan calisir."
          )

          $notesPath = Join-Path $env:RUNNER_TEMP "release_notes.txt"
          Set-Content -Path $notesPath -Value $lines -Encoding UTF8
          "notes_path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Anadil ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            ${{ steps.artifacts.outputs.zip_path }}
            ${{ steps.artifacts.outputs.setup_path }}
          fail_on_unmatched_files: false
